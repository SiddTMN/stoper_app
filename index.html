<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f6f78">
  <meta name="description" content="Stoper, minutnik i prosty planer serii treningowych.">
  <title>Stoper treningowy</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="pulse-dot" id="pulseDot" aria-hidden="true"></span>
      <span>Stoper treningowy</span>
    </div>

    <div class="topbar-actions">
      <button class="icon-button fullscreen-toggle" id="fullscreenToggle" type="button" aria-label="Przełącz pełny ekran" aria-keyshortcuts="F" aria-pressed="false" title="Pełny ekran (F)">FS</button>
      <button class="icon-button theme-toggle" id="themeToggle" type="button" aria-label="Przełącz motyw" aria-keyshortcuts="T" aria-pressed="false" title="Przełącz motyw (T)">
        <span class="theme-icon theme-icon-light" aria-hidden="true">☀</span>
        <span class="theme-icon theme-icon-dark" aria-hidden="true">☾</span>
      </button>
    </div>
  </header>

  <main class="app" aria-live="polite">
    <section class="mode-switch" aria-label="Tryb pracy">
      <button class="mode-button active" id="stopwatchMode" type="button" aria-keyshortcuts="1" aria-pressed="true" title="Stoper (1)">Stoper</button>
      <button class="mode-button" id="timerMode" type="button" aria-keyshortcuts="2" aria-pressed="false" title="Minutnik (2)">Minutnik</button>
      <button class="mode-button" id="workoutMode" type="button" aria-keyshortcuts="3" aria-pressed="false" title="Trening (3)">Trening</button>
    </section>

    <section class="timer-panel" aria-label="Czas">
      <p class="mode-label" id="modeLabel">Stoper</p>
      <div class="timer-display" id="timerDisplay">00:00<span class="milliseconds">.00</span></div>
      <p class="status-text" id="statusText">Gotowy</p>
      <div class="countdown-overlay" id="countdownOverlay" hidden>
        <span id="countdownValue">3</span>
      </div>
    </section>

    <section class="timer-settings" id="timerSettings" aria-label="Ustawienia minutnika" hidden>
      <div class="preset-row" aria-label="Szybkie czasy">
        <button class="preset-button" type="button" data-minutes="1">1 min</button>
        <button class="preset-button" type="button" data-minutes="2">2 min</button>
        <button class="preset-button" type="button" data-minutes="3">3 min</button>
        <button class="preset-button" type="button" data-minutes="5">5 min</button>
      </div>

      <label class="duration-field" for="durationInput">
        <span>Czas przerwy</span>
        <input id="durationInput" type="number" min="5" max="5999" step="5" value="90" inputmode="numeric">
        <span>sek.</span>
      </label>
    </section>

    <section class="workout-settings" id="workoutSettings" aria-label="Plan treningu" hidden>
      <div class="template-row" aria-label="Szablony ćwiczeń">
        <button class="preset-button" type="button" data-template="basic">Podstawowy</button>
        <button class="preset-button" type="button" data-template="core">Core</button>
        <button class="preset-button" type="button" data-template="mobility">Mobilność</button>
      </div>

      <div class="workout-grid">
        <label class="number-field" for="workDurationInput">
          <span>Praca</span>
          <input id="workDurationInput" type="number" min="5" max="1800" step="5" value="40" inputmode="numeric">
          <span>sek.</span>
        </label>
        <label class="number-field" for="restDurationInput">
          <span>Przerwa</span>
          <input id="restDurationInput" type="number" min="0" max="1800" step="5" value="20" inputmode="numeric">
          <span>sek.</span>
        </label>
        <label class="number-field" for="roundsInput">
          <span>Rundy</span>
          <input id="roundsInput" type="number" min="1" max="20" step="1" value="3" inputmode="numeric">
          <span>razy</span>
        </label>
      </div>

      <label class="exercise-field" for="exerciseNamesInput">
        <span>Ćwiczenia, każde w nowej linii</span>
        <textarea id="exerciseNamesInput" rows="4" spellcheck="false">Pompki
Przysiady
Plank</textarea>
      </label>
    </section>

    <section class="workout-overview" id="workoutOverview" aria-label="Przebieg treningu" hidden></section>

    <section class="controls" aria-label="Sterowanie">
      <button class="btn btn-secondary" id="btnLap" type="button" aria-keyshortcuts="L" title="Okrążenie (L)" disabled>Okrążenie</button>
      <button class="btn btn-primary" id="btnStartStop" type="button" aria-keyshortcuts="Space" title="Start / stop (Spacja)">Start</button>
      <button class="btn btn-secondary" id="btnReset" type="button" aria-keyshortcuts="R" title="Resetuj (R)" disabled>Resetuj</button>
    </section>

    <section class="shortcut-hints" aria-label="Skróty klawiszowe">
      <span><kbd>Spacja</kbd> start/stop</span>
      <span><kbd>R</kbd> reset</span>
      <span><kbd>L</kbd> okrążenie</span>
      <span><kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd> tryb</span>
      <span><kbd>F</kbd> pełny ekran</span>
      <span><kbd>T</kbd> motyw</span>
    </section>

    <section class="options" aria-label="Opcje">
      <label class="toggle-row">
        <input id="soundToggle" type="checkbox" checked>
        <span>Dźwięk końca przerwy</span>
      </label>
      <label class="toggle-row">
        <input id="countdownToggle" type="checkbox" checked>
        <span>Odliczanie 3-2-1 przed startem</span>
      </label>
      <label class="toggle-row">
        <input id="countdownSoundToggle" type="checkbox" checked>
        <span>Dźwięk odliczania</span>
      </label>
      <label class="toggle-row">
        <input id="wakeLockToggle" type="checkbox" checked>
        <span>Nie wygaszaj ekranu</span>
      </label>
    </section>

    <section class="laps-section" id="lapsSection" aria-label="Okrążenia"></section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
